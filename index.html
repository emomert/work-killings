<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkiye İş Cinayetleri Haritası</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Türkiye İş Cinayetleri Haritası</h1>
            <p class="description">
                İş kazaları değil, iş cinayetleri. Bu harita, Türkiye'de yetersiz iş güvenliği nedeniyle 
                hayatını kaybeden işçilerin anısına oluşturulmuştur.
            </p>
        </header>

        <div id="map"></div>

        <footer>
            <p>
                Her bir işaretleyici, bir iş cinayetini temsil etmektedir. 
                Detayları görmek için işaretleyicilere tıklayın.
            </p>
        </footer>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
    
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
