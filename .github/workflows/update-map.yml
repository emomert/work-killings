name: Update Work Accidents Map

on:
  # Her 6 saatte bir çalış
  schedule:
    - cron: '0 */6 * * *'
  
  # Manuel tetikleme imkanı
  workflow_dispatch:

jobs:
  update-map:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run scraper
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper.py
      
      - name: Check for changes
        id: check_changes
        run: |
          if [ -f "new_entries.json" ]; then
            echo "has_new_entries=true" >> $GITHUB_OUTPUT
          else
            echo "has_new_entries=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_new_entries == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json last_tweet_id.txt
          git commit -m "🔴 Yeni iş cinayeti kaydı eklendi [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
      
      - name: Create issue for new entries
        if: steps.check_changes.outputs.has_new_entries == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const newEntries = JSON.parse(fs.readFileSync('new_entries.json', 'utf8'));
            
            for (const entry of newEntries) {
              const victims = entry.victims && entry.victims.length > 0 
                ? entry.victims.map(v => `- ${v}`).join('\n') 
                : 'Bilinmiyor';
              
              const title = `🔴 Yeni İş Cinayeti - ${entry.city || 'Bilinmiyor'} - ${entry.date || 'Tarih belirsiz'}`;
              
              const body = [
                '## Yeni İş Cinayeti Kaydı Eklendi',
                '',
                `**📍 Konum:** ${entry.location || 'Bilinmiyor'}`,
                `**📅 Tarih:** ${entry.date || 'Bilinmiyor'}`,
                `**🏢 Şirket:** ${entry.company || 'Bilinmiyor'}`,
                '**⚰️ Hayatını Kaybedenler:**',
                victims,
                '',
                `**💀 Ölüm Nedeni:** ${entry.cause || 'Bilinmiyor'}`,
                '',
                '**📝 Detaylar:**',
                entry.details || 'Detay yok',
                '',
                `**🏭 Sektör:** ${entry.sector || 'Bilinmiyor'}`,
                '',
                '---',
                '',
                `**🐦 Kaynak Tweet:** https://twitter.com/i/status/${entry.tweetId || 'unknown'}`,
                `**🗺️ Koordinatlar:** ${entry.coords ? entry.coords.join(', ') : 'Bulunamadı'}`,
                `**⏰ Eklenme Zamanı:** ${entry.addedAt}`,
                '',
                '---',
                '',
                '### Yapılacaklar:',
                '- [ ] Bilgileri doğrula',
                '- [ ] Koordinatları kontrol et',
                '- [ ] Gerekirse düzeltme yap',
                '',
                'Bu kayıt otomatik olarak sisteme eklendi. Lütfen bilgileri kontrol edin.'
              ].join('\n');
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['needs-review', 'automated']
              });
            }
            
            core.info(`${newEntries.length} yeni kayıt için issue oluşturuldu`);
